<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ace Historney</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <img src="media/nosound.png" id="sound" onclick="toggleSound()">
    <audio id="bgm" src="audio/lobby.weba" loop muted></audio>
    <div id="titlescreen">
        <h1>Ace Historney</h1>
        <h5>Dive into the perspective of a defense attorney handling quite the OLD case...</h5>    
        <p id="credit">All music and characters accredited to Ace Attorney by Capcom.</p>
        <button id="start">Enter the Courtroom</button>
        <div id="defglow"></div>
        <div id="prosglow"></div>
        <img id="defense" src="media/Attorney.gif">
        <img id="prosecutor" src="media/Prosecutor.gif">
    </div>
    <p id="para1"></p>
    <video id="tape" height="720" width="1280">
        <source id="tapesource" src="media/placeholderv.mp4" type="video/mp4">
        Your browser does not support watching this tape. Lame! But yes, the tape did show the client just walking by the bay, only
        looking at the ships with the crates, not ever touching them. However, it lacks a timestamp.
    </video>
    <img id="visual">
    <p id="para2"></p>
    <p id="para3"></p>
    <div id="buttons">
        <button id="but1" hidden></button>
        <button id="but2" hidden></button>
        <button id="but3" hidden></button>
        <button id="extrabut"></button>
    </div>
    <div id="objectionWrap">
        <img id="objection" src="media/objection.webp" alt="Objection">
    </div>
</body>
</html>
